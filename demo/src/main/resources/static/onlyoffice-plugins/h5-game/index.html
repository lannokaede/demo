<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>插入 H5 小游戏</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../v1/plugins.js"></script>
  <script src="../v1/plugins-ui.js"></script>
  <link rel="stylesheet" href="../v1/plugins.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #d8dee8;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #3d6ef7;
      --accent-soft: rgba(61, 110, 247, 0.12);
      --success: #0f9f78;
      --error: #c43d3d;
      --shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(61, 110, 247, 0.08), transparent 28%),
        linear-gradient(180deg, #f7f8fb 0%, #eef2f7 100%);
      color: var(--text);
      overflow: hidden;
    }

    html {
      height: 100%;
    }

    .shell {
      padding: 14px;
      height: 100vh;
    }

    .panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--panel);
      border: 1px solid rgba(216, 222, 232, 0.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 24px 26px 20px;
      background:
        linear-gradient(135deg, rgba(61, 110, 247, 0.08), rgba(15, 159, 120, 0.06)),
        var(--panel);
      border-bottom: 1px solid rgba(216, 222, 232, 0.9);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 0;
      max-width: 460px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    .chip {
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(61, 110, 247, 0.18);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(260px, 0.92fr);
      align-items: start;
      gap: 20px;
      padding: 22px 26px 24px;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 18px 18px 16px;
    }

    .section.soft {
      background: var(--panel-soft);
    }

    .section-title {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 700;
    }

    .section-desc {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .field {
      margin-bottom: 12px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
    }

    input {
      width: 100%;
      border: 1px solid #cfd6e3;
      border-radius: 12px;
      background: #fff;
      padding: 11px 13px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      transform: translateY(-1px);
    }

    .preview-card {
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(216, 222, 232, 0.95);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
    }

    .preview-cover {
      position: relative;
      min-height: 142px;
      padding: 16px;
      display: flex;
      align-items: flex-end;
      background:
        linear-gradient(135deg, rgba(61, 110, 247, 0.88), rgba(15, 159, 120, 0.84)),
        #e8eefc;
      color: #fff;
    }

    .preview-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.22), transparent 28%),
        linear-gradient(180deg, transparent, rgba(0,0,0,0.12));
      pointer-events: none;
    }

    .preview-badge {
      position: relative;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.24);
      backdrop-filter: blur(8px);
    }

    .preview-body {
      padding: 16px;
    }

    .preview-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      color: #152132;
    }

    .preview-meta {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .meta-item {
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e4e9f2;
      padding: 11px 13px;
    }

    .meta-label {
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7b8794;
    }

    .meta-value {
      font-size: 13px;
      line-height: 1.5;
      color: #243041;
      word-break: break-all;
    }

    .hint {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(61, 110, 247, 0.06);
      border: 1px solid rgba(61, 110, 247, 0.16);
      color: #4c5a6c;
      font-size: 12px;
      line-height: 1.6;
    }

    .footer {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      padding: 14px 26px 18px;
      border-top: 1px solid rgba(216, 222, 232, 0.9);
      background: rgba(248, 250, 252, 0.76);
    }

    .status {
      min-height: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    .status.loading {
      color: var(--accent);
    }

    @media (max-width: 860px) {
      .content {
        grid-template-columns: 1fr;
      }

      .hero {
        flex-direction: column;
      }

      .chip {
        align-self: flex-start;
      }
    }

    @media (max-width: 560px) {
      .shell {
        padding: 10px;
      }

      .hero,
      .content,
      .footer {
        padding-left: 16px;
        padding-right: 16px;
      }

      .field-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="hero">
        <div>
          <h1>插入 H5 小游戏</h1>
          <p>选择存放在 MinIO 中的游戏资源包。后端会自动解析可用的下载地址，并生成适合插入幻灯片的互动卡片。</p>
        </div>
        <div class="chip">ONLYOFFICE 演示插件</div>
      </div>

      <div class="content">
        <div class="section">
          <div class="section-title">资源映射</div>
          <div class="section-desc">请填写游戏资源在 MinIO 中的位置，无需手动输入原始 HTML 链接。</div>

          <div class="field">
            <label for="gameName">游戏名称</label>
            <input id="gameName" placeholder="例如：记忆翻牌挑战">
          </div>

          <div class="field-row">
            <div class="field">
              <label for="bucketName">存储桶</label>
              <input id="bucketName" placeholder="例如：html-5-games">
            </div>
            <div class="field">
              <label for="entryFile">入口文件</label>
              <input id="entryFile" placeholder="例如：index.html">
            </div>
          </div>

          <div class="field">
            <label for="gameDir">游戏目录</label>
            <input id="gameDir" placeholder="例如：game-001">
          </div>

          <div class="field-row">
            <div class="field">
              <label for="widthMm">宽度（mm）</label>
              <input id="widthMm" type="number" min="1" step="1">
            </div>
            <div class="field">
              <label for="heightMm">高度（mm）</label>
              <input id="heightMm" type="number" min="1" step="1">
            </div>
          </div>
        </div>

        <div class="section soft">
          <div class="section-title">预览卡片</div>
          <div class="section-desc">下方展示的是插入到幻灯片中的卡片效果，插入后仍然可以继续调整大小。</div>

          <div class="preview-card">
            <div class="preview-cover">
              <div class="preview-badge">互动 H5</div>
            </div>
            <div class="preview-body">
               <h2 class="preview-title" id="previewTitle">待填写游戏名称</h2>

              <div class="preview-meta">
                <div class="meta-item">
                  <div class="meta-label">存储桶</div>
                  <div class="meta-value" id="previewBucket">待填写</div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">目录</div>
                  <div class="meta-value" id="previewDir">待填写</div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">入口</div>
                  <div class="meta-value" id="previewEntry">待填写</div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">尺寸</div>
                  <div class="meta-value" id="previewSize">默认尺寸</div>
                </div>
              </div>
            </div>
          </div>

          <div class="hint" id="resolvedHint">
            插入前，后端会校验 MinIO 中的资源对象，并解析出真实可访问的 HTML 地址。
          </div>
        </div>
      </div>

      <div class="footer">
        <div id="status" class="status">已就绪，可以插入基于 MinIO 的 H5 小游戏。</div>
      </div>
    </div>
  </div>

  <script src="./code.js"></script>
</body>
</html>
